name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # ── Create the GitHub Release first ────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: condense
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@a74c6b72af54cfa997e81df42d94703d6313a2d0 # v2.0.6
        with:
          tag_name: ${{ github.ref_name }}
          name: "Condense ${{ github.ref_name }}"
          body: |
            ## Condense ${{ github.ref_name }}

            ${{ steps.changelog.outputs.NOTES }}

            ## Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            Or download the binary for your platform below and verify the SHA-256 checksum in `checksums.txt`.
            All binaries are signed via Sigstore/cosign. You can verify provenance with:
            ```bash
            cosign verify-blob --certificate-identity-regexp "https://github.com/.*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" --signature <binary>.sig <binary>
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}

  # ── Build native binaries for each platform ─────────────────────────────────
  build-native:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    defaults:
      run:
        working-directory: condense

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            native_args: "--no-fallback,--static,--libc=musl"
            binary_suffix: ""
            sha_cmd: "sha256sum"

          - os: ubuntu-24.04-arm64
            target: linux-aarch64
            native_args: "--no-fallback,--static,--libc=musl"
            binary_suffix: ""
            sha_cmd: "sha256sum"

          - os: macos-14
            target: macos-aarch64
            native_args: "--no-fallback"
            binary_suffix: ""
            sha_cmd: "shasum -a 256"

          - os: macos-13
            target: macos-x64
            native_args: "--no-fallback"
            binary_suffix: ""
            sha_cmd: "shasum -a 256"

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@2911b2304bee2c2f59b9a67bf45f025a6b6de4b1 # v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven packages
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-${{ matrix.target }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-maven-
            ${{ runner.os }}-maven-

      - name: Install musl toolchain (Linux only)
        if: startsWith(matrix.target, 'linux')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools
          musl-gcc --version

      - name: Build native image
        run: |
          mvn package -Pnative -DskipTests \
            -Dquarkus.native.native-image-xmx=5g \
            -Dquarkus.native.additional-build-args="${{ matrix.native_args }}" \
            --no-transfer-progress -B

      - name: Verify binary
        run: |
          ./target/condense-runner --version
          echo "Binary size: $(du -sh target/condense-runner | cut -f1)"

      - name: Rename binary
        run: |
          cp target/condense-runner "condense-${{ matrix.target }}"

      - name: Upload artifact for signing
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: condense-${{ matrix.target }}
          path: condense/condense-${{ matrix.target }}
          if-no-files-found: error

  # ── Build .deb package (Linux x64 only) ────────────────────────────────────
  build-deb:
    name: Build .deb Package
    runs-on: ubuntu-latest
    needs: build-native
    defaults:
      run:
        working-directory: condense
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Download linux-x64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: condense-linux-x64
          path: condense/target/

      - name: Prepare binary
        run: |
          mv target/condense-linux-x64 target/condense-runner
          chmod +x target/condense-runner

      - name: Install dpkg-dev
        run: sudo apt-get install -y dpkg-dev

      - name: Build .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          chmod +x packaging/deb/build-deb.sh
          ./packaging/deb/build-deb.sh target/condense-runner "$VERSION" amd64

      - name: Upload .deb for signing
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: condense-deb
          path: condense/condense_*.deb

  # ── Sign, SBOM, and Publish ─────────────────────────────────────────────────
  publish-release:
    name: Publish Release Artifacts
    runs-on: ubuntu-latest
    needs: [create-release, build-native, build-deb]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3

      - name: Generate Checksums
        run: |
          cd artifacts
          sha256sum condense-* > checksums.txt
          cat checksums.txt

      - name: Sign artifacts and checksums
        env:
          COSIGN_YES: true
        run: |
          cd artifacts
          for file in condense-linux-x64 condense-linux-aarch64 condense-macos-x64 condense-macos-aarch64 *.deb checksums.txt; do
            if [ -f "$file" ]; then
              cosign sign-blob --output-signature "${file}.sig" --output-certificate "${file}.cert" "$file"
            fi
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@e8d2a6937ecead383dfe75190d104edd1f9c5751 # v0
        with:
          path: ./
          format: cyclonedx-json
          output-file: artifacts/sbom.cyclonedx.json

      - name: Upload to Release
        uses: softprops/action-gh-release@a74c6b72af54cfa997e81df42d94703d6313a2d0 # v2.0.6
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
