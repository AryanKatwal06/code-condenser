name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JVM build and tests ────────────────────────────────────────────────────
  jvm-test:
    name: JVM Tests (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: condense
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and test (JVM mode)
        run: mvn verify --no-transfer-progress -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jvm
          path: condense/target/surefire-reports/
          retention-days: 7

  # ── Native image build (Linux, non-static) ─────────────────────────────────
  native-linux:
    name: Native Image (Linux x64)
    runs-on: ubuntu-latest
    needs: jvm-test
    defaults:
      run:
        working-directory: condense
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build native image
        run: mvn package -Pnative -DskipTests -Dquarkus.native.native-image-xmx=5g --no-transfer-progress -B

      - name: Verify no fallback
        run: |
          if grep -q "fallback" target/native.log 2>/dev/null; then
            echo "ERROR: native image fell back to JVM mode"
            exit 1
          fi
          echo "✓ Native image built without fallback"

      - name: Smoke tests
        run: |
          ./target/condense-runner --version
          ./target/condense-runner --help
          echo "Exit code test:"
          ./target/condense-runner git status || echo "Exit: $?"

      - name: Measure native binary
        run: |
          BINARY=target/condense-runner
          chmod +x "$BINARY"

          echo "== Binary size =="
          ls -lh "$BINARY"

          echo "== Cold start (10 runs of --version) =="
          for i in $(seq 1 10); do
            START=$(date +%s%N)
            "$BINARY" --version > /dev/null
            END=$(date +%s%N)
            echo "Run $i: $(( (END - START) / 1000000 ))ms"
          done

          echo "== Peak RSS on a real filter path =="
          /usr/bin/time -v "$BINARY" git status 2>&1 | grep -i "maximum resident" || true

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: condense-linux-x64-dynamic
          path: condense/target/condense-runner
          retention-days: 3
