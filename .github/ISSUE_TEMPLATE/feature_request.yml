name: Feature Request
description: Suggest an idea for Condense
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thanks for suggesting a feature! Please fill out the form below."
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What is the new behavior or functionality?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why is this feature useful?
    validations:
      required: true
