name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JVM build and tests ────────────────────────────────────────────────────
  jvm-test:
    name: JVM Tests (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and test (JVM mode)
        run: mvn verify --no-transfer-progress -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jvm
          path: target/surefire-reports/
          retention-days: 7

  # ── Native image build (Linux, non-static) ─────────────────────────────────
  native-linux:
    name: Native Image (Linux x64)
    runs-on: ubuntu-latest
    needs: jvm-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build native image
        run: mvn package -Pnative -DskipTests --no-transfer-progress -B

      - name: Verify no fallback
        run: |
          if grep -q "fallback" target/native.log 2>/dev/null; then
            echo "ERROR: native image fell back to JVM mode"
            exit 1
          fi
          echo "✓ Native image built without fallback"

      - name: Smoke tests
        run: |
          ./target/zap-runner --version
          ./target/zap-runner --help
          echo "Exit code test:"
          ./target/zap-runner git status || echo "Exit: $?"

      - name: Startup benchmark (must be under 200ms each)
        run: |
          echo "Startup time benchmark:"
          for i in 1 2 3 4 5; do
            START=$(date +%s%N)
            ./target/zap-runner --version > /dev/null
            END=$(date +%s%N)
            MS=$(( (END - START) / 1000000 ))
            echo "  Run $i: ${MS}ms"
            if [ "$MS" -gt 200 ]; then
              echo "  WARNING: startup exceeded 200ms target"
            fi
          done

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: zap-linux-x64-dynamic
          path: target/zap-runner
          retention-days: 3
